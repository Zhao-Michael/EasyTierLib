name: BuildEasytier

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always
  LIBCLANG_PATH: /usr/lib/llvm-12/lib
  PROTOC: /usr/local/bin/protoc  # 明确指定 protoc 路径

defaults:
  run:
    shell: bash

jobs:
  release-build:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and Clang
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            wget \
            gnupg \
            unzip
          
          # 添加 LLVM 官方仓库
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
          echo "deb http://apt.llvm.org/focal/ llvm-toolchain-focal-12 main" >> /etc/apt/sources.list
          
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            llvm-12 \
            clang-12 \
            libclang-12-dev

      - name: Install Protobuf 3.12
        run: |
          # 安装 protoc 3.12.4 (支持 --experimental_allow_proto3_optional)
          PROTOC_VERSION=3.12.4
          PROTOC_ZIP=protoc-$PROTOC_VERSION-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/$PROTOC_ZIP
          unzip -o $PROTOC_ZIP -d /usr/local bin/protoc
          unzip -o $PROTOC_ZIP -d /usr/local 'include/*'
          rm -f $PROTOC_ZIP
          chmod +x /usr/local/bin/protoc
          
          # 安装 protobuf 编译依赖
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            autoconf \
            automake \
            libtool \
            make \
            g++
          
          # 编译安装 protobuf C++ 库
          PB_RELEASE=protobuf-$PROTOC_VERSION
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/$PB_RELEASE.tar.gz
          tar -xzvf $PB_RELEASE.tar.gz
          cd $PB_RELEASE
          ./configure --prefix=/usr
          make -j$(nproc)
          make install
          ldconfig
          cd ..
          rm -rf $PB_RELEASE*

      - name: Install cross-compilation dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            gcc-x86-64-linux-gnu \
            curl \
            pkg-config \
            libssl-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          rustup target add x86_64-unknown-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build for Linux (x86_64 and aarch64)
        env:
          BINDGEN_EXTRA_CLANG_ARGS: "--sysroot=/usr/aarch64-linux-gnu"
        run: |
          source $HOME/.cargo/env
          cd easytier
          
          # 验证 protoc 版本
          protoc --version
          
          # x86_64 编译
          cargo build --target x86_64-unknown-linux-gnu --release
          
          # aarch64 交叉编译
          CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc \
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          cargo build --target aarch64-unknown-linux-gnu --release

      - name: Package Binaries
        run: |
          mkdir -p release_binaries
          cp target/x86_64-unknown-linux-gnu/release/libeasytier.so release_binaries/easytier-linux-x86_64.so
          cp target/aarch64-unknown-linux-gnu/release/libeasytier.so release_binaries/easytier-linux-arm64.so

      - name: Create Release & Upload Artifacts
        uses: softprops/action-gh-release@v1
        if: github.ref_type == 'tag'
        with:
          make_latest: 'tag_name'
          files: |
            release_binaries/easytier-linux-x86_64.so
            release_binaries/easytier-linux-arm64.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}